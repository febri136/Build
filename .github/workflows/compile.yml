name: Build Ubuntu Touch Boot Image Mi8937

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04

    steps:
    - name: Standard Pengaturan Lingkungan Build
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev xz-utils wget curl git android-sdk-libsparse-utils initramfs-tools cpio libgmp-dev libmpc-dev libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

    - name: Set Up LLVM dan Clang Compiler
      uses: egor-tensin/setup-clang@v2
      with:
        version: 14
        platform: x64

    - name: Ambil Kode Sumber Kernel via Git Clone Mandiri
      run: |
        PROT="https"
        DOM="github.com"
        ORG="Mi-Thorium"
        REPO="kernel_msm-4.19.git"
        
        git clone "${PROT}://${DOM}/${ORG}/${REPO}" $GITHUB_WORKSPACE/kernel --depth=1

    - name: Unduh Modul Driver Wi-Fi, Kamera, dan Audio Secara Manual
      run: |
        cd $GITHUB_WORKSPACE/kernel
        
        PROT="https"
        DOM="github.com"
        ORG="Mi-Thorium"
        
        # DEFINISI REPO TUJUAN UTUH (Aman dari bug pemotongan teks pada ponsel Anda)
        WIFI_REPO="vendor_qcom_opensource_wlan_prima.git"
        CAM_REPO="kernel_techpack_camera-legacy.git"
        
        # 1. Menarik Driver Wi-Fi & Bluetooth (Prima) langsung ke folder drivers/staging/prima
        rm -rf drivers/staging/prima
        git clone "${PROT}://${DOM}/${ORG}/${WIFI_REPO}" drivers/staging/prima --depth=1
        
        # 2. Menarik Driver Kamera (Camera-Legacy) langsung ke folder techpack/camera-legacy
        mkdir -p techpack/camera-legacy
        git clone "${PROT}://${DOM}/${ORG}/${CAM_REPO}" techpack/camera-legacy --depth=1

    - name: Unduh & Jalankan Skrip Pemeriksa UBports
      run: |
        cd $GITHUB_WORKSPACE/kernel
        
        # Memicu pembuatan file konfigurasi hardware Mi8937 murni
        make ARCH=arm64 O=out msm8937_defconfig
        
        # Mengunduh skrip verifikasi kontainer sistem operasi Ubuntu Touch hulu
        curl -sLo check-kernel-config "https://githubusercontent.com"
        chmod +x check-kernel-config
        ./check-kernel-config out/.config -w
        make ARCH=arm64 O=out savedefconfig

    - name: Eksekusi Kompilasi Kernel 4.19
      run: |
        cd $GITHUB_WORKSPACE/kernel
        make ARCH=arm64 O=out CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- -j$(nproc)

    - name: Bungkus Kernel Menjadi boot.img (Halium)
      run: |
        cd $GITHUB_WORKSPACE
        curl -sLo mkbootimg "https://githubusercontent.com"
        chmod +x mkbootimg
        
        ./mkbootimg --kernel kernel/out/arch/arm64/boot/Image.gz-dtb \
                    --ramdisk /boot/initrd.img-generic \
                    --cmdline "console=ttyMSM0,115200n8 androidboot.hardware=qcom user_debug=31 androidboot.bootdevice=7824900.sdhci-retrofitted" \
                    --base 0x80000000 \
                    --pagesize 2048 \
                    -o ubuntu-touch-boot-mi8937.img

    - name: Unggah Hasil boot.img ke Tab Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UT-Boot-Image-Mi8937
        path: ubuntu-touch-boot-mi8937.img
        
