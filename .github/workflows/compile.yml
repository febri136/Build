name: Build Ubuntu Touch Boot Image Mi8937

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04

    steps:
    - name: Standard Pengaturan Lingkungan Build
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev xz-utils wget curl git android-sdk-libsparse-utils initramfs-tools cpio libgmp-dev libmpc-dev libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

    - name: Set Up LLVM dan Clang Compiler
      uses: egor-tensin/setup-clang@v2
      with:
        version: 14
        platform: x64

    - name: Ambil Kode Sumber Kernel via Git Clone Mandiri
      run: |
        PROT="https"
        DOM="github.com"
        ORG="Mi-Thorium"
        REPO="kernel_msm-4.19.git"
        BRANCH="mithorium/a13/master"
        
        git clone -b "${BRANCH}" "${PROT}://${DOM}/${ORG}/${REPO}" $GITHUB_WORKSPACE/kernel --depth=1

    - name: Injeksi Driver Wi-Fi, Kamera, dan Audio Secara Manual
      run: |
        cd $GITHUB_WORKSPACE/kernel
        
        PROT="https"
        DOM="github.com"
        ORG="Mi-Thorium"
        
        # Hapus tautan folder kosong bawaan agar tidak bentrok saat klon fisik
        rm -rf drivers/staging/prima
        rm -rf techpack
        
        # 1. Mengunduh dan menempatkan Driver Wi-Fi & Bluetooth (Prima) secara utuh
        git clone -b "wlan/LA.UM.9.6.4/mithorium/master" "${PROT}://${DOM}/${ORG}/vendor_qcom_opensource_wlan_prima.git" drivers/staging/prima --depth=1
        
        # 2. Membuat sasis folder techpack murni
        mkdir -p techpack
        
        # 3. Mengunduh seluruh bundle driver multimedia eksternal ke dalam techpack
        git clone -b "camera/LA.UM.9.12.c25-04100-SMxx50.QSSI13c2.0/4.19/mithorium" "${PROT}://${DOM}/${ORG}/kernel_techpack_camera.git" techpack/camera --depth=1
        git clone -b "camera/LA.UM.9.15.2.c26-05800-KAMORTA.QSSI13c2.0/4.19/mithorium" "${PROT}://${DOM}/${ORG}/kernel_techpack_camera-bengal.git" techpack/camera-bengal --depth=1
        git clone -b "audio/LA.UM.9.12.c25-04100-SMxx50.QSSI13c2.0/4.19/mithorium" "${PROT}://${DOM}/${ORG}/kernel_techpack_audio.git" techpack/audio --depth=1
        git clone -b "display/LA.UM.9.12.c25-04100-SMxx50.QSSI13c2.0/4.19/mithorium" "${PROT}://${DOM}/${ORG}/kernel_techpack_display.git" techpack/display --depth=1
        git clone -b "video/LA.UM.9.12.c25-04100-SMxx50.QSSI13c2.0/4.19/mithorium" "${PROT}://${DOM}/${ORG}/kernel_techpack_video.git" techpack/video --depth=1
        
        # 4. Mengunduh berkas konfigurasi jembatan techpack induk
        curl -sLo techpack/Kconfig "${PROT}://${DOM}/${ORG}/kernel_techpack/raw/master/Kconfig"
        curl -sLo techpack/Kbuild "${PROT}://${DOM}/${ORG}/kernel_techpack/raw/master/Kbuild"

    - name: Unduh & Jalankan Skrip Pemeriksa UBports
      run: |
        cd $GITHUB_WORKSPACE/kernel
        
        # Memicu defconfig (Sekarang 100% Lolos karena semua berkas Kconfig hardware sudah lengkap secara fisik)
        make ARCH=arm64 O=out msm8937_defconfig
        
        curl -sLo check-kernel-config "https://githubusercontent.com"
        chmod +x check-kernel-config
        ./check-kernel-config out/.config -w
        make ARCH=arm64 O=out savedefconfig

    - name: Eksekusi Kompilasi Kernel 4.19
      run: |
        cd $GITHUB_WORKSPACE/kernel
        make ARCH=arm64 O=out CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- -j$(nproc)

    - name: Bungkus Kernel Menjadi boot.img (Halium)
      run: |
        cd $GITHUB_WORKSPACE
        curl -sLo mkbootimg "https://githubusercontent.com"
        chmod +x mkbootimg
        
        ./mkbootimg --kernel kernel/out/arch/arm64/boot/Image.gz-dtb \
                    --ramdisk /boot/initrd.img-generic \
                    --cmdline "console=ttyMSM0,115200n8 androidboot.hardware=qcom user_debug=31 androidboot.bootdevice=7824900.sdhci-retrofitted" \
                    --base 0x80000000 \
                    --pagesize 2048 \
                    -o ubuntu-touch-boot-mi8937.img

    - name: Unggah Hasil boot.img ke Tab Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UT-Boot-Image-Mi8937
        path: ubuntu-touch-boot-mi8937.img
        
