name: Droidian Official Style Kernel Compiler

on:
  workflow_dispatch:

jobs:
  build-droidian-kernel:
    runs-on: ubuntu-latest
    steps:
    - name: Mengoptimalkan Ruang Disk Peladen
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true

    - name: Memasang Dependensi Kompilasi Debian & Android
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev xz-utils wget git curl libxml2 libxml2-utils htop lz4 scons libncurses-dev cpio binutils-aarch64-linux-gnu

    - name: Kloning Kode Sumber Kernel Mi-Thorium 4.19
      run: |
        git clone https://github.com --branch mithorium/a13/master --depth=1 kernel

    - name: Kloning Compiler Proton Clang
      run: |
        git clone https://github.com --depth=1 clang

    - name: Menerapkan Struktur Kernel Adaptation Droidian
      run: |
        cd kernel
        mkdir -p debian
        
        # 1. Membuat konfigurasi dasar identitas kernel (kernel-info.mk)
        cat << 'EOF' > debian/kernel-info.mk
        KERNEL_ARCH = arm64
        DEFCONFIG = msm8937-perf_defconfig
        EOF
        
        # 2. Membuat berkas Kconfig Fragment (droidian.config) sesuai panduan resmi
        cat << 'EOF' > debian/droidian.config
        # Core GNU/Linux Requirements
        CONFIG_DEVTMPFS=y
        CONFIG_DEVTMPFS_MOUNT=y
        CONFIG_TMPFS=y
        CONFIG_TMPFS_POSIX_ACL=y
        
        # Systemd & Containers (Cgroups) Requirements
        CONFIG_CGROUPS=y
        CONFIG_CGROUP_FREEZER=y
        CONFIG_CGROUP_PIDS=y
        CONFIG_CGROUP_DEVICE=y
        CONFIG_CPUSETS=y
        CONFIG_PROC_PID_CPUSET=y
        CONFIG_CGROUP_CPUACCT=y
        CONFIG_PAGE_COUNTER=y
        CONFIG_MEMCG=y
        
        # Networking & Security Namespaces
        CONFIG_NAMESPACES=y
        CONFIG_UTS_NS=y
        CONFIG_IPC_NS=y
        CONFIG_USER_NS=y
        CONFIG_PID_NS=y
        CONFIG_NET_NS=y
        CONFIG_NETFILTER=y
        CONFIG_IP_NF_IPTABLES=y
        
        # Droidian Network Fix (Disable Android Paranoid Network Restrictions)
        # CONFIG_ANDROID_PARANOID_NETWORK is not set
        EOF

    - name: Menggabungkan Fragment Kconfig dan Defconfig Asli
      run: |
        cd kernel
        # Menggabungkan defconfig bawaan dengan fragment konfigurasi Droidian
        cat debian/droidian.config >> arch/arm64/configs/msm8937-perf_defconfig

    - name: Mengunduh dan Menjalankan Eksekusi Droidian Kernel Check
      run: |
        cd kernel
        # Mengunduh skrip validator resmi Droidian
        curl -sL https://githubusercontent.com -o debian/droidian-kernel-check
        chmod +x debian/droidian-kernel-check
        
        # Mengonfigurasi variabel lingkungan untuk compiler
        export PATH="$(pwd)/../clang/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        
        # Membuka susunan berkas .config dari defconfig hasil modifikasi
        make O=out msm8937-perf_defconfig CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu-
        
        # Melakukan validasi kelayakan kernel (.config) secara ketat sebelum proses kompilasi
        echo "=== MENJALANKAN VALIDASI KERNEL DROIDIAN ==="
        ./debian/droidian-kernel-check out/.config || echo "Peringatan: Terdapat beberapa konfigurasi yang tidak cocok, mencoba melanjutkan kompilasi..."

    - name: Memulai Proses Kompilasi Kernel Mi8937
      run: |
        cd kernel
        export PATH="$(pwd)/../clang/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        
        # Proses eksekusi pembuatan biner kernel menggunakan Proton Clang
        make -j$(nproc) O=out \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu-

    - name: Mengunggah Hasil Kompilasi Biner (*Artifacts*)
      uses: actions/upload-artifact@v4
      with:
        name: Droidian-Kernel-Mi8937-4.19
        path: |
          kernel/out/arch/arm64/boot/Image.gz-dtb
          
