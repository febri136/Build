name: Build Ubuntu Touch Boot Image Mi8937 Minim Bug

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04

    steps:
    - name: Standard Pengaturan Lingkungan Build
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev xz-utils wget curl git android-sdk-libsparse-utils initramfs-tools cpio libgmp-dev libmpc-dev libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi lld llvm

    - name: Set Up LLVM dan Clang Compiler
      uses: egor-tensin/setup-clang@v2
      with:
        version: 14
        platform: x64

    - name: Ambil Kode Sumber Kernel via Git Clone Mandiri
      run: |
        PROT="https"
        DOM="github.com"
        ORG="Mi-Thorium"
        REPO="kernel_msm-4.19.git"
        BRANCH="mithorium/a13/master"
        
        git clone -b "${BRANCH}" "${PROT}://${DOM}/${ORG}/${REPO}" $GITHUB_WORKSPACE/kernel --depth=1

    - name: Injeksi Driver Wi-Fi Prima Publik (Mencegah Bug Wi-Fi Mati)
      run: |
        cd $GITHUB_WORKSPACE/kernel
        PROT="https"
        DOM="github.com"
        
        # Bersihkan symlink kosong bawaan repo
        rm -rf drivers/staging/prima
        
        # Ambil driver prima publik LineageOS 4.19 murni yang stabil
        git clone "${PROT}://${DOM}/LineageOS/android_vendor_qcom_opensource_wlan_prima.git" drivers/staging/prima --depth=1

    - name: Modifikasi Konfigurasi untuk Minim Bug di Ubuntu Touch
      run: |
        cd $GITHUB_WORKSPACE/kernel
        mkdir -p out
        
        # 1. Ekstrak defconfig awal perangkat Mi8937
        make ARCH=arm64 O=out LLVM=1 vendor/msm8937_defconfig
        
        # 2. FIX BUG COMPATIBILITY: Matikan subsistem BPF Android modern yang memicu kernel panic/crash kompilasi
        sed -i 's/CONFIG_BPF_PRELOAD=y/CONFIG_BPF_PRELOAD=n/g' out/.config
        echo 'CONFIG_BPF_PRELOAD_UMD=n' >> out/.config
        
        # 3. KUNCI MINIM BUG UBUNTU TOUCH: Menyuntikkan parameter kontainer wajib Linux (Halium Requirements)
        # Menjamin pengenalan systemd, mount namespace, dan hak akses jaringan aplikasi murni
        echo 'CONFIG_NAMESPACES=y' >> out/.config
        echo 'CONFIG_NET_NS=y' >> out/.config
        echo 'CONFIG_PID_NS=y' >> out/.config
        echo 'CONFIG_IPC_NS=y' >> out/.config
        echo 'CONFIG_UTS_NS=y' >> out/.config
        echo 'CONFIG_CGROUPS=y' >> out/.config
        echo 'CONFIG_CGROUP_FREEZER=y' >> out/.config
        echo 'CONFIG_CGROUP_DEVICE=y' >> out/.config
        echo 'CONFIG_DEVTMPFS=y' >> out/.config
        echo 'CONFIG_DEVTMPFS_MOUNT=y' >> out/.config
        echo 'CONFIG_DEVPTS_MULTIPLE_INSTANCES=y' >> out/.config
        echo 'CONFIG_ANDROID_BINDER_IPC=y' >> out/.config
        echo 'CONFIG_ANDROID_BINDER_DEVICES="binder,hwbinder,vndbinder"' >> out/.config
        
        # 4. Simpan kembali konfigurasi yang sudah ditambal rapi
        make ARCH=arm64 O=out LLVM=1 savedefconfig

    - name: Eksekusi Kompilasi Kernel 4.19
      run: |
        cd $GITHUB_WORKSPACE/kernel
        make ARCH=arm64 O=out CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 -j$(nproc)

    - name: Bungkus Kernel Menjadi boot.img (Halium)
      run: |
        cd $GITHUB_WORKSPACE
        curl -sLo mkbootimg "https://githubusercontent.com"
        chmod +x mkbootimg
        
        ./mkbootimg --kernel kernel/out/arch/arm64/boot/Image.gz-dtb \
                    --ramdisk /boot/initrd.img-generic \
                    --cmdline "console=ttyMSM0,115200n8 androidboot.hardware=qcom user_debug=31 androidboot.bootdevice=7824900.sdhci-retrofitted" \
                    --base 0x80000000 \
                    --pagesize 2048 \
                    -o ubuntu-touch-boot-mi8937.img

    - name: Unggah Hasil boot.img ke Tab Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UT-Boot-Image-Mi8937-MinimBug
        path: ubuntu-touch-boot-mi8937.img
        
