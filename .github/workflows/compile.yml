name: Build Ubuntu Touch Boot Image Mi8937

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04

    steps:
    - name: Standard Pengaturan Lingkungan Build
      run: |
        sudo apt-get update
        # PERBAIKAN 1: Menambahkan lld dan llvm ke dalam baris instalan apt-get bawaan Ubuntu
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev xz-utils wget curl git android-sdk-libsparse-utils initramfs-tools cpio libgmp-dev libmpc-dev libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi lld llvm

    - name: Set Up LLVM dan Clang Compiler
      uses: egor-tensin/setup-clang@v2
      with:
        version: 14
        platform: x64

    - name: Ambil Kode Sumber Kernel via Git Clone Mandiri
      run: |
        # Memecah komponen URL agar kebal dari bug potong tautan pada ponsel Anda
        PROT="https"
        DOM="github.com"
        ORG="Mi-Thorium"
        REPO="kernel_msm-4.19.git"
        BRANCH="mithorium/a13/master"
        
        # Mengunduh langsung cabang khusus Mi-Thorium msm-4.19 yang berisi folder techpack utuh secara fisik
        git clone -b "${BRANCH}" "${PROT}://${DOM}/${ORG}/${REPO}" $GITHUB_WORKSPACE/kernel --depth=1

    - name: Sinkronisasi dan Pembersihan Jalur Kconfig
      run: |
        cd $GITHUB_WORKSPACE/kernel
        
        # 1. Hapus tautan gitlink prima kosong yang memicu galat otentikasi Username privat
        rm -rf drivers/staging/prima
        
        # 2. Matikan deklarasi pemanggilan prima di drivers/staging/Kconfig agar tidak dicari saat compile
        if [ -f "drivers/staging/Kconfig" ]; then
          sed -i 's/source "drivers\/staging\/prima\/Kconfig"/#source "drivers\/staging\/prima\/Kconfig"/g' drivers/staging/Kconfig
        fi
        
        # 3. PERBAIKAN TECHPACK: Menghapus baris pencarian folder fiktif (baris 11-15) yang membuat build gagal
        if [ -f "techpack/Kconfig" ]; then
          sed -i '/camera-legacy/d' techpack/Kconfig
          sed -i '/xiaomi-msm8937/d' techpack/Kconfig
          sed -i '/xiaomi-sdm439/d' techpack/Kconfig
          
          # Menyisipkan instruksi pemanggilan folder 'camera' asli tepat sebelum kata 'endmenu'
          sed -i '/endmenu/i \source "techpack/camera/Kconfig"' techpack/Kconfig
        fi

        # 4. MEMBUAT KCONFIG DI FOLDER CAMERA: Karena folder camera hanya berisi Makefile/Kbuild,
        # kita buatkan Kconfig kosong agar sistem make menganggapnya valid dan tidak melempar galat.
        if [ -d "techpack/camera" ]; then
          echo '# Camera subsystem Kconfig dummy' > techpack/camera/Kconfig
        fi

    - name: Menyiapkan File Konfigurasi Defconfig
      run: |
        cd $GITHUB_WORKSPACE/kernel
        mkdir -p out
        # Menggunakan parameter LLVM=1 sejak pembuatan defconfig awal
        make ARCH=arm64 O=out LLVM=1 vendor/msm8937_defconfig
        make ARCH=arm64 O=out LLVM=1 savedefconfig

    - name: Eksekusi Kompilasi Kernel 4.19
      run: |
        cd $GITHUB_WORKSPACE/kernel
        # Menambahkan LLVM=1 untuk memaksa sistem menggunakan llvm-binutils modern bebas dari Unrecognized form 0x22
        make ARCH=arm64 O=out CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 -j$(nproc)

    - name: Bungkus Kernel Menjadi boot.img (Halium)
      run: |
        cd $GITHUB_WORKSPACE
        curl -sLo mkbootimg "https://githubusercontent.com"
        chmod +x mkbootimg
        
        ./mkbootimg --kernel kernel/out/arch/arm64/boot/Image.gz-dtb \
                    --ramdisk /boot/initrd.img-generic \
                    --cmdline "console=ttyMSM0,115200n8 androidboot.hardware=qcom user_debug=31 androidboot.bootdevice=7824900.sdhci-retrofitted" \
                    --base 0x80000000 \
                    --pagesize 2048 \
                    -o ubuntu-touch-boot-mi8937.img

    - name: Unggah Hasil boot.img ke Tab Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UT-Boot-Image-Mi8937
        path: ubuntu-touch-boot-mi8937.img
        
