name: Build Ubuntu Touch Boot Image Mi8937

on:
  workflow_dispatch: # Memungkinkan Anda menjalankan build secara manual dari web GitHub

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Standard Pengaturan Lingkungan Build
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev xz-utils wget curl git android-sdk-libsparse-utils initramfs-tools cpio libgmp-dev libmpc-dev libelf-dev

    - name: Unduh Android Toolchain (Proton Clang Pre-built)
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchain
        cd $GITHUB_WORKSPACE/toolchain
        # Mengunduh LLVM/Clang pra-kompilasi mandiri via HTTPS tarball (bebas dari isu otentikasi git)
        wget https://github.com -O clang.tar.gz
        tar -xf clang.tar.gz
        mv proton-clang-master clang
        rm clang.tar.gz

    - name: Ambil Kode Sumber Kernel 4.19 Mi8937
      run: |
        # Mengunduh repositori kernel 4.19 Mi-Thorium unified msm8937
        git clone https://github.com -b master $GITHUB_WORKSPACE/kernel --depth=1

    - name: Unduh & Jalankan Skrip Pemeriksa UBports
      run: |
        cd $GITHUB_WORKSPACE/kernel
        make ARCH=arm64 O=out msm8937_defconfig
        # Mengunduh skrip verifikasi konfigurasi resmi milik UBports
        wget https://githubusercontent.com
        chmod +x check-kernel-config
        # Mengotomatiskan injeksi parameter wajib Ubuntu Touch ke berkas .config
        ./check-kernel-config out/.config -w
        # Menyimpan hasil modifikasi konfigurasi kembali ke struktur defconfig sebelum kompilasi
        make ARCH=arm64 O=out savedefconfig

    - name: Eksekusi Kompilasi Kernel 4.19
      run: |
        cd $GITHUB_WORKSPACE/kernel
        # Mengatur jalur path compiler Clang terpadu
        export PATH="$GITHUB_WORKSPACE/toolchain/clang/bin:$PATH"
        
        # Eksekusi kompilasi murni menggunakan bendera Proton Clang
        make ARCH=arm64 O=out CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- -j$(nproc)

    - name: Bungkus Kernel Menjadi boot.img (Halium)
      run: |
        cd $GITHUB_WORKSPACE
        # Mengunduh utilitas ramdisk dan skrip pembungkus mkbootimg standar
        git clone https://github.com --depth=1
        wget https://githubusercontent.com
        chmod +x mkbootimg
        
        # Eksekusi pembungkusan kernel (Membaca biner dari folder output 'out')
        ./mkbootimg --kernel kernel/out/arch/arm64/boot/Image.gz-dtb \
                    --ramdisk halium-boot/initramfs-tools-halium/initrd.img-touch-arm64 \
                    --cmdline "console=ttyMSM0,115200n8 androidboot.hardware=qcom user_debug=31 androidboot.bootdevice=7824900.sdhci-retrofitted" \
                    --base 0x80000000 \
                    --pagesize 2048 \
                    -o ubuntu-touch-boot-mi8937.img

    - name: Unggah Hasil boot.img ke Tab Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UT-Boot-Image-Mi8937
        path: ubuntu-touch-boot-mi8937.img
        
