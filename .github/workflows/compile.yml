name: Build Ubuntu Touch Boot Image Mi8937

on:
  workflow_dispatch: # Memungkinkan Anda menjalankan build secara manual dari web GitHub

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Standard Pengaturan Lingkungan Build
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev xz-utils wget curl git format-junk android-sdk-libsparse-utils initramfs-tools cpio

    - name: Unduh Android Toolchain (Clang/GCC)
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchain
        cd $GITHUB_WORKSPACE/toolchain
        # Mengunduh AOSP GCC sebagai toolchain arm64 standar
        git clone https://googlesource.com --depth=1

    - name: Ambil Kode Sumber Kernel 4.19 Mi8937
      run: |
        git clone https://github.com -b master $GITHUB_WORKSPACE/kernel --depth=1

    - name: Unduh & Jalankan Skrip Pemeriksa UBports
      run: |
        cd $GITHUB_WORKSPACE/kernel
        make ARCH=arm64 msm8937_defconfig
        wget https://githubusercontent.com
        chmod +x check-kernel-config
        # Mengotomatiskan injeksi parameter wajib Ubuntu Touch ke berkas .config
        ./check-kernel-config .config -w
        # Simpan kembali konfigurasi yang sudah lolos uji ke defconfig asli
        savedefconfig ARCH=arm64

    - name: Eksekusi Kompilasi Kernel 4.19
      run: |
        cd $GITHUB_WORKSPACE/kernel
        export PATH="$GITHUB_WORKSPACE/toolchain/aarch64-linux-android-4.9/bin:$PATH"
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-android-
        make ARCH=arm64 -j$(nproc)

    - name: Bungkus Kernel Menjadi boot.img (Halium)
      run: |
        cd $GITHUB_WORKSPACE
        # Mengunduh utilitas ramdisk dan pembuat bootimg
        git clone https://github.com/Halium/halium-boot.git --depth=1
        wget https://githubusercontent.com
        chmod +x mkbootimg
        
        # Contoh perintah pembungkusan biner kernel (Sesuaikan cmdline dengan spesifikasi Mi8937 Anda)
        ./mkbootimg --kernel kernel/arch/arm64/boot/Image.gz-dtb \
                    --ramdisk halium-boot/initramfs-tools-halium/initrd.img-touch-arm64 \
                    --cmdline "console=ttyMSM0,115200n8 androidboot.hardware=qcom user_debug=31" \
                    --base 0x80000000 \
                    --pagesize 2048 \
                    -o ubuntu-touch-boot-mi8937.img

    - name: Unggah Hasil boot.img ke Tab Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UT-Boot-Image-Mi8937
        path: ubuntu-touch-boot-mi8937.img
        
